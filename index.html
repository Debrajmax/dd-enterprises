<!DOCTYPE html>
<html>
<head>
<title>DD Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;margin:0;background:#f3f3f3}

/* HEADER */
header{
background:#131921;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

/* PRODUCT GRID */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

/* CARD */
.card{
background:white;
margin:15px;
padding:15px;
width:250px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

/* BUTTON */
button{
background:#ffd814;
border:none;
padding:10px;
width:100%;
margin-top:10px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#f7ca00;
}

/* DETAILS PAGE */
.details{
display:none;
padding:20px;
background:white;
margin:20px;
border-radius:10px;
}

.main-img{
width:300px;
border-radius:10px;
}

.thumbs img{
width:60px;
margin:5px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
DD Enterprises
</header>

<!-- PRODUCT LIST -->
<div class="grid" id="home">

<div class="card" onclick="showProduct()">
<img src="pillow1.jpg">
<h3>Cooling Memory Foam Pillow</h3>
<p>₹2999</p>
<button>View</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/61nZ6+9cZVL._SX679_.jpg">
<h3>Lazy Glasses</h3>
<p>₹999</p>
<button onclick="alert('Coming soon')">View</button>
</div>

<div class="card">
<img src="https://m.media-amazon.com/images/I/71dEY4Neo3L._SX679_.jpg">
<h3>LED Desk Lamp</h3>
<p>₹799</p>
<button onclick="alert('Coming soon')">View</button>
</div>

</div>

<!-- PRODUCT DETAILS -->
<div class="details" id="product">

<h2>Cooling Gel Memory Foam Pillow</h2>

<img id="mainImage" class="main-img" src="pillow1.jpg">

<div class="thumbs">
<img src="pillow1.jpg" onclick="changeImage(this.src)">
<img src="pillow2.jpg" onclick="changeImage(this.src)">
<img src="pillow3.jpg" onclick="changeImage(this.src)">
<img src="pillow4.jpg" onclick="changeImage(this.src)">
<img src="pillow5.jpg" onclick="changeImage(this.src)">
</div>

<p><b>Price: ₹2999</b></p>

<button onclick="buyNow()">Buy Now</button>
<button onclick="goBack()">Back</button>

<ul>
<li>✔ Orthopedic support</li>
<li>✔ Cooling gel</li>
<li>✔ Neck pain relief</li>
<li>✔ Breathable design</li>
</ul>

</div>

<script>

function showProduct(){
document.getElementById("home").style.display="none";
document.getElementById("product").style.display="block";
}

function goBack(){
document.getElementById("home").style.display="flex";
document.getElementById("product").style.display="none";
}

function changeImage(src){
document.getElementById("mainImage").src=src;
}

function buyNow(){
alert("Order placed! Add payment next.");
}

</script>

</body>
</html>
